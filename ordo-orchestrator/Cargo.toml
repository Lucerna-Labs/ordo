[package]
name = "ordo-orchestrator"
version = "0.1.0"
edition = "2021"
description = "Deterministic multi-agent orchestrator: splits a goal, dispatches parallel scoped subagents, runs adversarial quality gates, and drives the loop until done. Runs in-process as a Tokio peer on the ordo bus. See docs/agent-orchestration.md."
publish = false

[dependencies]
serde = { workspace = true }
serde_json = { workspace = true }
tokio = { workspace = true }
uuid = { workspace = true }
async-trait = { workspace = true }
tracing = { workspace = true }

[lints.clippy]
dbg_macro = "deny"
todo = "warn"
