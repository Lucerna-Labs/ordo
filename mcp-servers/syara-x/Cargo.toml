[package]
name = "ordo-syara-x-server"
version = "0.1.0"
edition = "2021"
description = "Ordo MCP server wrapping syara-x for semantic YARA matching"

[lib]
name = "ordo_syara_x_server"
path = "src/lib.rs"
crate-type = ["cdylib"]

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = { version = "1" }

[profile.release]
opt-level = "s"
lto = true
strip = true

