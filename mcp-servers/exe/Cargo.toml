[package]
name = "ordo-exe-server"
version = "0.1.0"
edition = "2021"
description = "Ordo MCP server wrapping goblin + exe-rs for executable inspection and header injection"

[lib]
name = "ordo_exe_server"
path = "src/lib.rs"
crate-type = ["cdylib"]

[dependencies]
goblin = "0.9"
serde = { version = "1", features = ["derive"] }
serde_json = { version = "1" }

[profile.release]
opt-level = "s"
lto = true
strip = true

