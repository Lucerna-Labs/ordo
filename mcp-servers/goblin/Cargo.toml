[package]
name = "ordo-goblin-server"
version = "0.1.0"
edition = "2021"
description = "Ordo MCP server wrapping goblin for PE/ELF/Mach-O binary parsing"

[lib]
name = "ordo_goblin_server"
path = "src/lib.rs"
crate-type = ["cdylib"]

[dependencies]
goblin = { version = "0.9", features = ["std"] }
serde = { version = "1", features = ["derive"] }
serde_json = { version = "1" }

[profile.release]
opt-level = "s"
lto = true
strip = true

