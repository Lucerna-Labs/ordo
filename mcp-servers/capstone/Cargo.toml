[package]
name = "ordo-capstone-server"
version = "0.1.0"
edition = "2021"
description = "Ordo MCP server wrapping capstone for x86/ARM disassembly"

[lib]
name = "ordo_capstone_server"
path = "src/lib.rs"
crate-type = ["cdylib"]

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = { version = "1" }

[profile.release]
opt-level = "s"
lto = true
strip = true

