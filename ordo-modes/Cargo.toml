[package]
name = "ordo-modes"
version = "0.1.0"
edition = "2021"
description = "Mode-scoped workspaces — manifests + registry for the assistant's bounded operating environments. Each mode defines memory scope, RAG domain set, tool allowlist, policy preset, planner bias, and persona; the runtime composes them into a turn's context boundary."

[lib]
name = "ordo_modes"
path = "src/lib.rs"

[dependencies]
ordo-skills = { path = "../ordo-skills" }
serde.workspace = true
serde_json.workspace = true
thiserror.workspace = true
tracing.workspace = true
parking_lot.workspace = true

[dev-dependencies]
tempfile = "3"
