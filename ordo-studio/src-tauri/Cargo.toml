[package]
name = "ordo-studio"
version = "0.1.0"
description = "Ordo Studio — desktop shell for the Ordo local-first runtime"
authors = ["Lucerna Labs"]
edition = "2021"

[workspace]

# Override the binary name so the dev build (target/debug/Ordo.exe) and
# the release build both ship as "Ordo" — easy to identify in Windows
# Task Manager and macOS Activity Monitor next to the lowercase
# `ordo.exe` runtime CLI.
[[bin]]
name = "Ordo"
path = "src/main.rs"

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
chrono = { version = "0.4", features = ["serde"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tauri = { version = "2", features = [] }
# Native OS file picker — used by the MCP tab's "Browse…" button so
# operators don't have to type C:\projects\…\ordo-mcp.exe by hand.
tauri-plugin-dialog = "2"

[target.'cfg(windows)'.dependencies]
winreg = "0.55"
