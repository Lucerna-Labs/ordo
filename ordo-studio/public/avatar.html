<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ordo Avatar (preview)</title>
    <style>
      :root {
        color-scheme: dark;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: #0c0d10;
        color: #e6e8ec;
        font-family:
          ui-sans-serif,
          system-ui,
          -apple-system,
          "Segoe UI",
          Roboto,
          sans-serif;
      }
      body {
        display: grid;
        grid-template-rows: auto 1fr auto;
        gap: 12px;
        padding: 16px;
        box-sizing: border-box;
      }
      header {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        gap: 16px;
      }
      header h1 {
        margin: 0;
        font-size: 16px;
        font-weight: 600;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        color: #a0a4ad;
      }
      header .status {
        font-size: 12px;
        color: #6b707a;
      }
      header .status.live {
        color: #4ade80;
      }
      header .status.error {
        color: #f87171;
      }
      main {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 16px;
        min-height: 0;
      }
      #stage {
        width: 256px;
        height: 256px;
        position: relative;
        background: #16181d;
        border-radius: 18px;
        box-shadow: 0 16px 40px rgba(0, 0, 0, 0.4);
        overflow: hidden;
        display: grid;
        place-items: center;
      }
      #stage video.clip {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        opacity: 0;
        transition: opacity 0.4s ease;
      }
      #stage video.clip.active {
        opacity: 1;
      }
      .debug {
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        font-size: 12px;
        color: #8b909a;
        display: grid;
        grid-template-columns: auto 1fr;
        gap: 4px 14px;
        text-align: left;
      }
      .debug dt {
        color: #6b707a;
      }
      .debug dd {
        margin: 0;
        color: #c8ccd4;
      }
      footer {
        display: flex;
        gap: 8px;
        align-items: stretch;
      }
      footer input {
        flex: 1;
        padding: 10px 12px;
        border-radius: 10px;
        border: 1px solid #2a2d34;
        background: #16181d;
        color: #e6e8ec;
        font: inherit;
      }
      footer input:focus {
        outline: 2px solid #4ade80;
        outline-offset: 2px;
        border-color: transparent;
      }
      footer button {
        padding: 10px 18px;
        border-radius: 10px;
        border: 1px solid #2a2d34;
        background: #1f2128;
        color: #e6e8ec;
        font: inherit;
        cursor: pointer;
      }
      footer button:hover {
        background: #262932;
      }
      footer button:active {
        background: #303440;
      }
      footer button:disabled {
        opacity: 0.4;
        cursor: not-allowed;
      }
      footer .voice-toggle {
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 12px;
        color: #8b909a;
        white-space: nowrap;
        user-select: none;
        cursor: pointer;
      }
      footer .voice-toggle input {
        flex: none;
        width: 14px;
        height: 14px;
        padding: 0;
        accent-color: #4ade80;
      }
      /* voice-to-voice additions */
      footer {
        flex-direction: column;
        align-items: stretch;
      }
      .controls-row {
        display: flex;
        gap: 8px;
        align-items: stretch;
      }
      .settings-row {
        display: flex;
        gap: 12px;
        align-items: center;
        flex-wrap: wrap;
      }
      #mic {
        flex: 1;
        padding: 12px;
        font-size: 15px;
        font-weight: 600;
      }
      #mic.listening {
        background: rgba(74, 222, 128, 0.16);
        border-color: #4ade80;
        color: #4ade80;
        animation: ordo-pulse 1.4s ease-in-out infinite;
      }
      @keyframes ordo-pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.45; }
      }
      #sttService {
        flex: 1;
        min-width: 120px;
        font-size: 12px;
        padding: 6px 10px;
      }
      #convo {
        width: 100%;
        max-height: 110px;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        gap: 4px;
        text-align: left;
        font-size: 13px;
        line-height: 1.5;
      }
      #convo:empty { display: none; }
      .convo-line .who {
        color: #6b707a;
        font-weight: 600;
        margin-right: 5px;
      }
      .convo-line.user { color: #c8ccd4; }
      .convo-line.ordo { color: #4ade80; }
    </style>
  </head>
  <body>
    <header>
      <h1>Ordo Avatar · preview</h1>
      <span id="status" class="status">connecting…</span>
    </header>
    <main>
      <div id="stage">
        <video id="clipA" class="clip" muted playsinline></video>
        <video id="clipB" class="clip" muted playsinline></video>
      </div>
      <dl class="debug">
        <dt>state</dt><dd id="dbg-state">idle</dd>
        <dt>clip</dt><dd id="dbg-clip">—</dd>
      </dl>
    </main>
    <footer>
      <div id="convo" aria-live="polite"></div>
      <div class="controls-row">
        <button id="mic" title="Tap to talk — speak, then tap again to send">🎤 Tap to talk</button>
      </div>
      <div class="settings-row">
        <label
          class="voice-toggle"
          title="Use the configured cloud voice provider (OpenAI-compatible / MiniMax) instead of the browser voice"
        >
          <input id="cloudVoice" type="checkbox" />
          cloud voice
        </label>
        <input
          id="sttService"
          type="text"
          placeholder="STT provider (optional)"
          autocomplete="off"
          title="Credential service name for speech-to-text (e.g. a local whisper server). Leave blank to let Ordo pick."
        />
      </div>
    </footer>
    <script type="module">
      // ---------------------------------------------------------------
      // Ordo Avatar window.
      //
      // Framework-free — vanilla JS. The avatar is a set of looping
      // video clips (idle / typing / phone / thinking / speaking),
      // served from `/avatar/clips/*` and described by
      // `/avatar/clips.json`. The page plays the clip matching the
      // avatar's current STATE, driven by the voice loop below:
      //
      //  - idle      → cycle the ambient behaviors (look around / type /
      //                answer the phone),
      //  - thinking  → while a transcribe→turn round-trip is in flight,
      //  - speaking  → while the spoken reply is playing.
      //
      // (A freely-moving head and sprite lip-sync can't coexist, so we
      // sequence behaviors by state instead of compositing visemes.)
      // ---------------------------------------------------------------

      // ---------------------------------------------------------------
      // Behavior-clip renderer. The avatar is a set of looping video
      // clips (idle / typing / phone / thinking / speaking). The page
      // plays the clip matching the avatar's current STATE, which the
      // local voice loop drives directly: idle by default, "thinking"
      // while a turn is in flight, "speaking" while the reply plays.
      // (A moving head and sprite lip-sync can't coexist, so we sequence
      // behaviors by state instead of compositing.) Two stacked <video>s
      // crossfade on every change.
      // ---------------------------------------------------------------
      const clipEls = [
        document.getElementById("clipA"),
        document.getElementById("clipB"),
      ];
      let clipManifest = { clips: {}, idle_rotation: [] };
      let idleRotation = ["idle"];
      let idleIdx = 0;
      let activeVid = 0; // which <video> is currently shown
      let currentClip = null;
      let avatarState = "";

      function clipUrl(name) {
        const rel = clipManifest.clips && clipManifest.clips[name];
        return rel ? "/" + rel : null;
      }

      // First existing clip among the candidates (falls back to idle).
      function pickClip(...names) {
        for (const n of names) {
          if (clipUrl(n)) return n;
        }
        return idleRotation[0] || "idle";
      }

      function playClip(name, loop) {
        const url = clipUrl(name);
        if (!url) return;
        if (name === currentClip && clipEls[activeVid].loop === loop) return;
        currentClip = name;
        const cur = clipEls[activeVid];
        const nxt = clipEls[1 - activeVid];
        nxt.loop = loop;
        nxt.onended = loop
          ? null
          : () => {
              if (avatarState === "idle") advanceIdle();
            };
        const reveal = () => {
          nxt.removeEventListener("playing", reveal);
          nxt.classList.add("active");
          cur.classList.remove("active");
          activeVid = 1 - activeVid;
        };
        nxt.addEventListener("playing", reveal);
        nxt.src = url;
        try {
          nxt.currentTime = 0;
        } catch (_e) {
          // some browsers reject currentTime before metadata — harmless.
        }
        nxt.play().catch(() => {
          // Muted autoplay is normally allowed; if blocked, the first mic
          // tap (a user gesture) lets playback through.
        });
        if (dbgClip) dbgClip.textContent = name;
      }

      function advanceIdle() {
        idleIdx = (idleIdx + 1) % idleRotation.length;
        playClip(idleRotation[idleIdx], false);
      }

      function setAvatarState(state) {
        if (state === avatarState) return;
        avatarState = state;
        if (dbgState) dbgState.textContent = state;
        if (state === "speaking") {
          playClip(pickClip("speaking", "talking"), true);
        } else if (state === "thinking") {
          playClip(pickClip("thinking", "idle"), true);
        } else if (state === "annoyed") {
          playClip(pickClip("annoyed", "idle"), true);
        } else {
          idleIdx = 0;
          // If there's a rotation, play each once and advance on end;
          // a single idle clip just loops.
          playClip(idleRotation[0], idleRotation.length <= 1);
        }
      }

      // Small control surface so the host (Studio shell, pop-out opener) or a
      // test can drive the avatar's behavior state externally — e.g. reflect
      // the *main* assistant's thinking/speaking, not just this page's voice
      // loop. The local voice loop remains the default driver.
      window.ordoAvatar = {
        setState: (s) => setAvatarState(s),
        get state() {
          return avatarState;
        },
      };

      const statusEl = document.getElementById("status");
      const dbgState = document.getElementById("dbg-state");
      const dbgClip = document.getElementById("dbg-clip");
      const cloudVoiceEl = document.getElementById("cloudVoice");

      // Remember the cloud-voice preference across window reopens.
      try {
        cloudVoiceEl.checked =
          localStorage.getItem("ordo.avatar.cloudVoice") === "1";
        cloudVoiceEl.addEventListener("change", () => {
          localStorage.setItem(
            "ordo.avatar.cloudVoice",
            cloudVoiceEl.checked ? "1" : "0",
          );
        });
      } catch (_err) {
        // localStorage may be unavailable (private mode) — non-fatal.
      }

      function setStatus(text, kind) {
        statusEl.textContent = text;
        statusEl.className = "status" + (kind ? " " + kind : "");
      }

      async function boot() {
        try {
          const res = await fetch("/avatar/clips.json", { cache: "no-store" });
          if (!res.ok) throw new Error(`HTTP ${res.status}`);
          clipManifest = await res.json();
        } catch (err) {
          setStatus(`clips manifest failed: ${err.message ?? err}`, "error");
          return;
        }
        idleRotation =
          clipManifest.idle_rotation && clipManifest.idle_rotation.length
            ? clipManifest.idle_rotation
            : Object.keys(clipManifest.clips || {});
        if (!idleRotation.length) idleRotation = ["idle"];

        setStatus("live", "live");
        setAvatarState("idle");

        // Keep a lightweight SSE link only for the status badge — the local
        // voice loop owns idle/thinking/speaking, so there's no second
        // state owner to race with.
        try {
          const source = new EventSource("/sse/avatar");
          source.addEventListener("subscribed", () => setStatus("live", "live"));
          source.onerror = () => setStatus("reconnecting…", "error");
        } catch (_e) {
          // SSE is optional for the clip avatar — non-fatal.
        }
      }

      // Speech is two independent channels timed off the same text:
      //
      //  1. Visemes — `POST /api/avatar/speak` always fires. The
      //     server stub TTS publishes the `ordo.tts.phoneme.frame`
      //     stream that the avatar driver turns into the frames we
      //     render here. This drives the lip-sync no matter which
      //     audio path is used.
      //
      //  2. Audio — provider-agnostic:
      //       - "cloud voice" ON → `POST /api/voice/speech`, which
      //         routes to whichever voice provider is configured
      //         (OpenAI-compatible or MiniMax — see
      //         `ordo_cloud::voice`). The returned audio is played
      //         in-window; the active provider is shown in the
      //         status line.
      //       - OFF (default, zero-config) or on any cloud failure →
      //         the browser's `speechSynthesis` voice.
      //
      // The two channels are timed off the same text, so they stay
      // roughly aligned without an explicit sync protocol.
      let currentAudio = null;

      // Resolves when speech finishes (so the VAD stays paused until the
      // avatar is done talking — it never hears itself).
      function speakViaBrowser(text) {
        return new Promise((resolve) => {
          try {
            if ("speechSynthesis" in window) {
              window.speechSynthesis.cancel();
              const u = new SpeechSynthesisUtterance(text);
              u.onend = () => resolve();
              u.onerror = () => resolve();
              window.speechSynthesis.speak(u);
            } else {
              resolve();
            }
          } catch (err) {
            console.warn("speechSynthesis failed", err);
            resolve();
          }
        });
      }

      async function speakViaProvider(text) {
        try {
          const res = await fetch("/api/voice/speech", {
            method: "POST",
            headers: { "content-type": "application/json" },
            body: JSON.stringify({ input: text }),
          });
          if (!res.ok) {
            const body = await res.text();
            console.warn("voice/speech failed", res.status, body);
            setStatus(
              `cloud voice unavailable (${res.status}) — using browser voice`,
              "error",
            );
            return false;
          }
          const provider = res.headers.get("x-ordo-tts-provider") || "provider";
          const blob = await res.blob();
          const url = URL.createObjectURL(blob);
          if (currentAudio) {
            currentAudio.pause();
          }
          currentAudio = new Audio(url);
          setStatus(`speaking · voice: ${provider}`, "live");
          // Resolve only when playback ENDS, so the caller (and the VAD)
          // knows the avatar has finished talking.
          let played = true;
          await new Promise((resolve) => {
            currentAudio.addEventListener("ended", () => {
              URL.revokeObjectURL(url);
              resolve();
            });
            currentAudio.addEventListener("error", () => {
              URL.revokeObjectURL(url);
              played = false;
              resolve();
            });
            currentAudio.play().catch((e) => {
              console.warn("audio play failed", e);
              played = false;
              resolve();
            });
          });
          return played;
        } catch (err) {
          console.warn("cloud voice error", err);
          return false;
        }
      }

      // Speak a given string: drive the lip-sync visemes + play the audio
      // (cloud provider when opted in, else the browser voice). The avatar
      // is voice-only — this is called by the voice-to-voice loop to speak
      // the assistant's reply, never to echo typed text.
      async function speakText(text) {
        setAvatarState("speaking");
        try {
          const visemePost = fetch("/api/avatar/speak", {
            method: "POST",
            headers: { "content-type": "application/json" },
            body: JSON.stringify({ text }),
          })
            .then(async (res) => {
              if (!res.ok) {
                const body = await res.text();
                setStatus(`speak failed: ${res.status} ${body}`, "error");
              }
            })
            .catch((err) => {
              setStatus(`speak failed: ${err.message ?? err}`, "error");
            });

          let spoke = false;
          if (cloudVoiceEl.checked) {
            spoke = await speakViaProvider(text);
          }
          if (!spoke) {
            await speakViaBrowser(text);
          }
          await visemePost;
        } finally {
          setAvatarState("idle");
        }
      }

      // ---------------------------------------------------------------
      // Voice activation (VAD) + mute. The avatar is voice-only: while
      // UNMUTED it listens continuously, auto-detects when you start/stop
      // speaking (energy-based VAD over a Web Audio AnalyserNode), then runs
      // transcribe → assistant turn (dedicated "avatar" mode session) →
      // spoken reply. A mute button stops listening. VAD pauses while the
      // avatar is speaking so it never hears itself. Starts MUTED
      // (privacy-first) — the mic only opens on unmute — and is released when
      // this page goes away (leaving the avatar tab unmounts it, or the
      // pop-out closes). See docs/plans/2026-06-10-avatar-voice-to-voice-design.md
      // ---------------------------------------------------------------
      const micBtn = document.getElementById("mic");
      const sttInput = document.getElementById("sttService");
      const convoEl = document.getElementById("convo");
      let voiceSessionId = null;

      // VAD state
      let muted = true;
      let micStream = null;
      let audioCtx = null;
      let analyser = null;
      let vadData = null;
      let vadTimer = null;
      let recorder = null;
      let recChunks = [];
      let recordingActive = false;
      let processing = false; // transcribing / thinking / speaking → VAD paused
      let speechFrames = 0;
      let silenceStart = 0;
      let recStartTs = 0;
      let recFormat = "webm";

      const VAD_START_RMS = 0.03; // energy to begin capturing
      const VAD_SILENCE_RMS = 0.018; // below this counts as silence
      const VAD_START_FRAMES = 3; // consecutive loud ticks to trigger a start
      const VAD_SILENCE_MS = 900; // trailing silence that ends an utterance
      const VAD_MIN_MS = 350; // ignore blips shorter than this

      try {
        sttInput.value = localStorage.getItem("ordo.avatar.sttService") || "";
        sttInput.addEventListener("change", () => {
          localStorage.setItem("ordo.avatar.sttService", sttInput.value.trim());
        });
      } catch (_err) {
        // localStorage unavailable — non-fatal.
      }

      function addConvo(role, text) {
        if (!convoEl) return;
        const line = document.createElement("div");
        line.className = "convo-line " + role;
        const who = document.createElement("span");
        who.className = "who";
        who.textContent = role === "user" ? "you:" : "Ordo:";
        line.appendChild(who);
        line.appendChild(document.createTextNode(text));
        convoEl.appendChild(line);
        convoEl.scrollTop = convoEl.scrollHeight;
      }

      async function ensureVoiceSession() {
        if (voiceSessionId) return voiceSessionId;
        const res = await fetch("/api/assistant/sessions", {
          method: "POST",
          headers: { "content-type": "application/json" },
          body: JSON.stringify({ title: "Avatar voice", mode: "avatar" }),
        });
        if (!res.ok) throw new Error(`session create failed: ${res.status}`);
        const s = await res.json();
        voiceSessionId =
          s.id || s.session_id || (s.session && s.session.id) || null;
        if (!voiceSessionId) throw new Error("session id missing in response");
        return voiceSessionId;
      }

      function blobToBase64(blob) {
        return new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onloadend = () => {
            const s = String(reader.result || "");
            resolve(s.slice(s.indexOf(",") + 1)); // strip the data: prefix
          };
          reader.onerror = reject;
          reader.readAsDataURL(blob);
        });
      }

      // Annoyed reaction — a brief flash she shows when something fails, when
      // you're short/rude with her, or when you make her repeat herself. Falls
      // back to idle until an `annoyed` clip exists in the manifest.
      const ANNOYED_MS = 1700;
      let lastUserMessage = "";
      const RUDE_RE =
        /\b(shut\s*up|stupid|idiot|dumb|dummy|moron|useless|hate you|shut it|hurry up|whatever|nevermind|never mind|you'?re wrong|ur wrong|so dumb|be quiet|don'?t care)\b/i;
      const normalizeMsg = (t) =>
        t.toLowerCase().replace(/[^a-z0-9 ]/g, "").replace(/\s+/g, " ").trim();
      const isRudeMessage = (t) => RUDE_RE.test(t);
      const isRepeatMessage = (t) => {
        const n = normalizeMsg(t);
        return n.length > 0 && n === lastUserMessage;
      };
      async function flashAnnoyed() {
        setAvatarState("annoyed");
        await new Promise((r) => setTimeout(r, ANNOYED_MS));
      }

      async function runVoiceLoop(blob, format) {
        let failed = true; // any early return below leaves this true → annoyed
        setAvatarState("thinking");
        try {
        // 1. transcribe (agnostic STT)
        setStatus("transcribing…");
        let text;
        try {
          const audio_base64 = await blobToBase64(blob);
          const service = sttInput.value.trim();
          const res = await fetch("/api/voice/transcribe", {
            method: "POST",
            headers: { "content-type": "application/json" },
            body: JSON.stringify({
              audio_base64,
              format,
              ...(service ? { service } : {}),
            }),
          });
          if (!res.ok) {
            const body = await res.text();
            console.warn("transcribe failed", res.status, body);
            setStatus(`transcribe failed (${res.status})`, "error");
            return;
          }
          text = (await res.json()).text;
        } catch (err) {
          setStatus(`transcribe error: ${err.message ?? err}`, "error");
          return;
        }
        if (!text || !text.trim()) {
          setStatus("…didn't catch that", "error");
          return;
        }
        addConvo("user", text);

        // Annoyed reactions: if you're short/rude or you just asked the same
        // thing again, she flashes annoyed before (still) helping.
        if (isRudeMessage(text) || isRepeatMessage(text)) {
          await flashAnnoyed();
          setAvatarState("thinking");
        }
        lastUserMessage = normalizeMsg(text);

        // 2. assistant turn (dedicated voice session)
        setStatus("thinking…");
        let reply;
        try {
          const sid = await ensureVoiceSession();
          const res = await fetch("/api/assistant/turn", {
            method: "POST",
            headers: { "content-type": "application/json" },
            body: JSON.stringify({ session_id: sid, user_message: text }),
          });
          if (!res.ok) {
            const body = await res.text();
            console.warn("assistant turn failed", res.status, body);
            setStatus(`assistant failed (${res.status})`, "error");
            return;
          }
          const result = await res.json();
          reply = result && result.turn && result.turn.assistant_response;
        } catch (err) {
          setStatus(`assistant error: ${err.message ?? err}`, "error");
          return;
        }
        if (!reply || !reply.trim()) {
          setStatus("…no reply", "error");
          return;
        }
        addConvo("ordo", reply);

        // 3. speak the reply (visemes + audio)
        failed = false; // we have a real reply — this turn succeeded
        await speakText(reply);
        } finally {
          if (failed) {
            // Something went wrong (couldn't hear you / model failed / no
            // reply) — she gets annoyed, then settles back to idle.
            await flashAnnoyed();
            setAvatarState("idle");
          } else if (avatarState === "thinking") {
            // speakText already flips speaking→idle on success.
            setAvatarState("idle");
          }
        }
      }

      function setMicUI() {
        if (muted) {
          micBtn.classList.remove("listening");
          micBtn.textContent = "🔇 Muted — tap to talk";
        } else {
          micBtn.classList.add("listening");
          micBtn.textContent = "🎙 Listening — tap to mute";
        }
      }

      function readRms() {
        analyser.getByteTimeDomainData(vadData);
        let sum = 0;
        for (let i = 0; i < vadData.length; i += 1) {
          const v = (vadData[i] - 128) / 128;
          sum += v * v;
        }
        return Math.sqrt(sum / vadData.length);
      }

      function startUtterance() {
        recChunks = [];
        try {
          recorder = new MediaRecorder(
            micStream,
            recFormat === "ogg" ? { mimeType: "audio/ogg" } : { mimeType: "audio/webm" },
          );
        } catch (_e) {
          try {
            recorder = new MediaRecorder(micStream);
          } catch (_e2) {
            return;
          }
        }
        recorder.ondataavailable = (e) => {
          if (e.data && e.data.size) recChunks.push(e.data);
        };
        recorder.onstop = async () => {
          recordingActive = false;
          if (muted) return; // muted mid-utterance — discard
          const blob = new Blob(recChunks, { type: recorder.mimeType || "audio/webm" });
          const elapsed = Date.now() - recStartTs;
          if (blob.size === 0 || elapsed < VAD_MIN_MS) {
            setStatus("listening…", "live");
            return;
          }
          processing = true; // pause VAD while we transcribe / think / speak
          try {
            await runVoiceLoop(blob, recFormat);
          } finally {
            processing = false;
            if (!muted) setStatus("listening…", "live");
          }
        };
        recorder.start();
        recordingActive = true;
        recStartTs = Date.now();
        silenceStart = 0;
        setStatus("hearing you…", "live");
      }

      function vadTick() {
        if (muted || processing || !analyser) return;
        const level = readRms();
        if (!recordingActive) {
          if (level >= VAD_START_RMS) {
            speechFrames += 1;
            if (speechFrames >= VAD_START_FRAMES) {
              speechFrames = 0;
              startUtterance();
            }
          } else {
            speechFrames = 0;
          }
        } else if (level < VAD_SILENCE_RMS) {
          if (silenceStart === 0) silenceStart = Date.now();
          else if (Date.now() - silenceStart >= VAD_SILENCE_MS) {
            silenceStart = 0;
            if (recorder && recorder.state !== "inactive") recorder.stop();
          }
        } else {
          silenceStart = 0; // continued speech resets the silence timer
        }
      }

      async function unmute() {
        try {
          micStream = await navigator.mediaDevices.getUserMedia({
            audio: {
              echoCancellation: true,
              noiseSuppression: true,
              autoGainControl: true,
            },
          });
        } catch (err) {
          console.warn("getUserMedia failed", err);
          setStatus("mic blocked — allow microphone access", "error");
          return;
        }
        try {
          const Ctx = window.AudioContext || window.webkitAudioContext;
          audioCtx = new Ctx();
          const source = audioCtx.createMediaStreamSource(micStream);
          analyser = audioCtx.createAnalyser();
          analyser.fftSize = 1024;
          source.connect(analyser);
          vadData = new Uint8Array(analyser.fftSize);
        } catch (err) {
          console.warn("audio analyser failed", err);
          setStatus("voice activation unsupported here", "error");
          micStream.getTracks().forEach((t) => t.stop());
          micStream = null;
          return;
        }
        const mime = MediaRecorder.isTypeSupported("audio/webm")
          ? "audio/webm"
          : MediaRecorder.isTypeSupported("audio/ogg")
            ? "audio/ogg"
            : "";
        recFormat = mime.includes("ogg") ? "ogg" : "webm";
        muted = false;
        recordingActive = false;
        speechFrames = 0;
        silenceStart = 0;
        setMicUI();
        setStatus("listening…", "live");
        vadTimer = window.setInterval(vadTick, 50);
      }

      function muteMic() {
        muted = true;
        if (vadTimer) {
          clearInterval(vadTimer);
          vadTimer = null;
        }
        try {
          if (recorder && recorder.state !== "inactive") recorder.stop();
        } catch (_e) {
          // ignore
        }
        recordingActive = false;
        if (micStream) {
          micStream.getTracks().forEach((t) => t.stop());
          micStream = null;
        }
        if (audioCtx) {
          audioCtx.close().catch(() => {});
          audioCtx = null;
        }
        analyser = null;
        setMicUI();
        setStatus("muted");
      }

      micBtn.addEventListener("click", () => {
        if (muted) void unmute();
        else muteMic();
      });
      setMicUI();

      // Release the mic when the surface goes away: leaving the avatar tab
      // unmounts this iframe, and closing the pop-out fires pagehide.
      window.addEventListener("pagehide", () => {
        if (!muted) muteMic();
      });

      boot();
    </script>
  </body>
</html>
