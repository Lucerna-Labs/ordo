<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ordo Avatar (preview)</title>
    <style>
      :root {
        color-scheme: dark;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: #0c0d10;
        color: #e6e8ec;
        font-family:
          ui-sans-serif,
          system-ui,
          -apple-system,
          "Segoe UI",
          Roboto,
          sans-serif;
      }
      body {
        display: grid;
        grid-template-rows: auto 1fr auto;
        gap: 12px;
        padding: 16px;
        box-sizing: border-box;
      }
      header {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        gap: 16px;
      }
      header h1 {
        margin: 0;
        font-size: 16px;
        font-weight: 600;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        color: #a0a4ad;
      }
      header .status {
        font-size: 12px;
        color: #6b707a;
      }
      header .status.live {
        color: #4ade80;
      }
      header .status.error {
        color: #f87171;
      }
      main {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 16px;
        min-height: 0;
      }
      #stage {
        width: 256px;
        height: 256px;
        position: relative;
        background: #16181d;
        border-radius: 18px;
        box-shadow: 0 16px 40px rgba(0, 0, 0, 0.4);
        overflow: hidden;
        display: grid;
        place-items: center;
      }
      #stage canvas {
        image-rendering: pixelated;
        width: 224px;
        height: 224px;
      }
      .debug {
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        font-size: 12px;
        color: #8b909a;
        display: grid;
        grid-template-columns: auto 1fr;
        gap: 4px 14px;
        text-align: left;
      }
      .debug dt {
        color: #6b707a;
      }
      .debug dd {
        margin: 0;
        color: #c8ccd4;
      }
      footer {
        display: flex;
        gap: 8px;
        align-items: stretch;
      }
      footer input {
        flex: 1;
        padding: 10px 12px;
        border-radius: 10px;
        border: 1px solid #2a2d34;
        background: #16181d;
        color: #e6e8ec;
        font: inherit;
      }
      footer input:focus {
        outline: 2px solid #4ade80;
        outline-offset: 2px;
        border-color: transparent;
      }
      footer button {
        padding: 10px 18px;
        border-radius: 10px;
        border: 1px solid #2a2d34;
        background: #1f2128;
        color: #e6e8ec;
        font: inherit;
        cursor: pointer;
      }
      footer button:hover {
        background: #262932;
      }
      footer button:active {
        background: #303440;
      }
      footer button:disabled {
        opacity: 0.4;
        cursor: not-allowed;
      }
      footer .voice-toggle {
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 12px;
        color: #8b909a;
        white-space: nowrap;
        user-select: none;
        cursor: pointer;
      }
      footer .voice-toggle input {
        flex: none;
        width: 14px;
        height: 14px;
        padding: 0;
        accent-color: #4ade80;
      }
      /* voice-to-voice additions */
      footer {
        flex-direction: column;
        align-items: stretch;
      }
      .controls-row {
        display: flex;
        gap: 8px;
        align-items: stretch;
      }
      .settings-row {
        display: flex;
        gap: 12px;
        align-items: center;
        flex-wrap: wrap;
      }
      #mic {
        flex: 1;
        padding: 12px;
        font-size: 15px;
        font-weight: 600;
      }
      #mic.recording {
        background: rgba(248, 113, 113, 0.2);
        border-color: #f87171;
        color: #f87171;
        animation: ordo-pulse 1s ease-in-out infinite;
      }
      @keyframes ordo-pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.45; }
      }
      #sttService {
        flex: 1;
        min-width: 120px;
        font-size: 12px;
        padding: 6px 10px;
      }
      #convo {
        width: 100%;
        max-height: 110px;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        gap: 4px;
        text-align: left;
        font-size: 13px;
        line-height: 1.5;
      }
      #convo:empty { display: none; }
      .convo-line .who {
        color: #6b707a;
        font-weight: 600;
        margin-right: 5px;
      }
      .convo-line.user { color: #c8ccd4; }
      .convo-line.ordo { color: #4ade80; }
    </style>
  </head>
  <body>
    <header>
      <h1>Ordo Avatar · preview</h1>
      <span id="status" class="status">connecting…</span>
    </header>
    <main>
      <div id="stage">
        <canvas id="avatar" width="128" height="128"></canvas>
      </div>
      <dl class="debug">
        <dt>mouth</dt><dd id="dbg-mouth">—</dd>
        <dt>expression</dt><dd id="dbg-expression">—</dd>
        <dt>glitch</dt><dd id="dbg-glitch">—</dd>
        <dt>frames</dt><dd id="dbg-frames">0</dd>
      </dl>
    </main>
    <footer>
      <div id="convo" aria-live="polite"></div>
      <div class="controls-row">
        <button id="mic" title="Tap to talk — speak, then tap again to send">🎤 Tap to talk</button>
      </div>
      <div class="settings-row">
        <label
          class="voice-toggle"
          title="Use the configured cloud voice provider (OpenAI-compatible / MiniMax) instead of the browser voice"
        >
          <input id="cloudVoice" type="checkbox" />
          cloud voice
        </label>
        <input
          id="sttService"
          type="text"
          placeholder="STT provider (optional)"
          autocomplete="off"
          title="Credential service name for speech-to-text (e.g. a local whisper server). Leave blank to let Ordo pick."
        />
      </div>
    </footer>
    <script type="module">
      // ---------------------------------------------------------------
      // Ordo Avatar preview window.
      //
      // This page is intentionally framework-free — vanilla JS + a
      // single canvas. The renderer:
      //
      //  1. Fetches `/avatar/avatar.json` to learn the atlas layout.
      //  2. Loads the three atlas PNGs (mouth / expression / glitch).
      //  3. Opens an EventSource to `/sse/avatar` and paints each
      //     incoming AvatarFrame by compositing the matching cells.
      //  4. The "Speak" button POSTs to `/api/avatar/speak`, which
      //     hands the text to the stub TTS producer; the resulting
      //     phoneme stream flows through the avatar driver and lands
      //     here as a stream of frames.
      //
      // Step-7 will replace the server-side TTS stub with
      // `window.speechSynthesis` — at that point this page either
      // becomes the dev fallback or gets folded into OrdoShell. For
      // v0.1 it's the test surface.
      // ---------------------------------------------------------------

      // ARPAbet phoneme → 8-viseme grouping. Mirrors
      // `ordo_avatar::atlas::phoneme_to_viseme`. Kept in JS so the
      // renderer can run a "preview" frame even before the server
      // sends one (and so a future direct-from-Web-Speech-API
      // wiring stays self-contained on the page).
      const PHONEME_VISEME = {
        REST: 0,
        M: 1, B: 1, P: 1,
        F: 2, V: 2,
        T: 3, D: 3, N: 3, S: 3, Z: 3, L: 3, TH: 3, DH: 3,
        K: 4, G: 4, NG: 4, HH: 4,
        AA: 5, AE: 5, AH: 5, AY: 5, EH: 5, EY: 5, IH: 5, IY: 5, ER: 5,
        AO: 6, OW: 6, OY: 6, AW: 6, UH: 6, UW: 6,
        R: 7, Y: 7, W: 7, CH: 7, JH: 7, SH: 7, ZH: 7,
      };

      const EXPRESSION_CELL = {
        Neutral: 0,
        Speaking: 1,
        Thinking: 2,
        Alarmed: 3,
        Amused: 4,
        Glitched: 5,
      };

      const GLITCH_CELL = {
        None: null,
        Light: 0,
        Heavy: 1,
      };

      const statusEl = document.getElementById("status");
      const canvas = document.getElementById("avatar");
      const ctx = canvas.getContext("2d");
      const dbgMouth = document.getElementById("dbg-mouth");
      const dbgExpression = document.getElementById("dbg-expression");
      const dbgGlitch = document.getElementById("dbg-glitch");
      const dbgFrames = document.getElementById("dbg-frames");
      const cloudVoiceEl = document.getElementById("cloudVoice");

      // Remember the cloud-voice preference across window reopens.
      try {
        cloudVoiceEl.checked =
          localStorage.getItem("ordo.avatar.cloudVoice") === "1";
        cloudVoiceEl.addEventListener("change", () => {
          localStorage.setItem(
            "ordo.avatar.cloudVoice",
            cloudVoiceEl.checked ? "1" : "0",
          );
        });
      } catch (_err) {
        // localStorage may be unavailable (private mode) — non-fatal.
      }

      function setStatus(text, kind) {
        statusEl.textContent = text;
        statusEl.className = "status" + (kind ? " " + kind : "");
      }

      async function loadImage(src) {
        return new Promise((resolve, reject) => {
          const img = new Image();
          img.onload = () => resolve(img);
          img.onerror = (err) => reject(err);
          img.src = src;
        });
      }

      async function boot() {
        let descriptor;
        try {
          const res = await fetch("/avatar/avatar.json", { cache: "no-store" });
          if (!res.ok) throw new Error(`HTTP ${res.status}`);
          descriptor = await res.json();
        } catch (err) {
          setStatus(`atlas descriptor failed: ${err.message ?? err}`, "error");
          return;
        }

        let atlases;
        try {
          atlases = {
            mouth: await loadImage("/" + descriptor.mouth.atlas_path),
            expression: await loadImage("/" + descriptor.expression.atlas_path),
            glitch: await loadImage("/" + descriptor.glitch.atlas_path),
          };
        } catch (err) {
          setStatus(`atlas PNGs failed`, "error");
          return;
        }

        const cellW = descriptor.cell_width;
        const cellH = descriptor.cell_height;
        canvas.width = cellW;
        canvas.height = cellH;

        let frameCount = 0;
        let lastFrame = {
          mouth: "Rest",
          expression: "Neutral",
          glitch: "None",
        };

        function paint(frame) {
          // Composite: expression backdrop → mouth on top →
          // glitch overlay (if any). Matches the renderer order
          // documented on `AvatarFrame`.
          const exprIdx = EXPRESSION_CELL[frame.expression] ?? 0;
          const visemeIdx = PHONEME_VISEME[frame.mouth] ?? 0;
          const glitchIdx = GLITCH_CELL[frame.glitch];

          ctx.clearRect(0, 0, cellW, cellH);
          ctx.drawImage(
            atlases.expression,
            exprIdx * cellW, 0, cellW, cellH,
            0, 0, cellW, cellH,
          );
          ctx.drawImage(
            atlases.mouth,
            visemeIdx * cellW, 0, cellW, cellH,
            0, 0, cellW, cellH,
          );
          if (glitchIdx !== null && glitchIdx !== undefined) {
            ctx.drawImage(
              atlases.glitch,
              glitchIdx * cellW, 0, cellW, cellH,
              0, 0, cellW, cellH,
            );
          }

          dbgMouth.textContent = frame.mouth;
          dbgExpression.textContent = frame.expression;
          dbgGlitch.textContent = frame.glitch;
          dbgFrames.textContent = String(++frameCount);
          lastFrame = frame;
        }

        // Initial idle paint so the canvas isn't blank while we
        // wait for the first frame.
        paint(lastFrame);

        const source = new EventSource("/sse/avatar");
        source.addEventListener("subscribed", () => {
          setStatus("live", "live");
        });
        source.addEventListener("frame", (e) => {
          try {
            const frame = JSON.parse(e.data);
            paint(frame);
          } catch (err) {
            // Bad payload — keep the previous frame on screen.
            console.error("avatar frame parse failed", err, e.data);
          }
        });
        source.onerror = () => {
          // EventSource auto-reconnects; surface the gap so the
          // operator knows the stream blinked.
          setStatus("reconnecting…", "error");
        };
      }

      // Speech is two independent channels timed off the same text:
      //
      //  1. Visemes — `POST /api/avatar/speak` always fires. The
      //     server stub TTS publishes the `ordo.tts.phoneme.frame`
      //     stream that the avatar driver turns into the frames we
      //     render here. This drives the lip-sync no matter which
      //     audio path is used.
      //
      //  2. Audio — provider-agnostic:
      //       - "cloud voice" ON → `POST /api/voice/speech`, which
      //         routes to whichever voice provider is configured
      //         (OpenAI-compatible or MiniMax — see
      //         `ordo_cloud::voice`). The returned audio is played
      //         in-window; the active provider is shown in the
      //         status line.
      //       - OFF (default, zero-config) or on any cloud failure →
      //         the browser's `speechSynthesis` voice.
      //
      // The two channels are timed off the same text, so they stay
      // roughly aligned without an explicit sync protocol.
      let currentAudio = null;

      function speakViaBrowser(text) {
        try {
          if ("speechSynthesis" in window) {
            window.speechSynthesis.cancel();
            window.speechSynthesis.speak(new SpeechSynthesisUtterance(text));
          }
        } catch (err) {
          console.warn("speechSynthesis failed", err);
        }
      }

      async function speakViaProvider(text) {
        try {
          const res = await fetch("/api/voice/speech", {
            method: "POST",
            headers: { "content-type": "application/json" },
            body: JSON.stringify({ input: text }),
          });
          if (!res.ok) {
            const body = await res.text();
            console.warn("voice/speech failed", res.status, body);
            setStatus(
              `cloud voice unavailable (${res.status}) — using browser voice`,
              "error",
            );
            return false;
          }
          const provider = res.headers.get("x-ordo-tts-provider") || "provider";
          const blob = await res.blob();
          const url = URL.createObjectURL(blob);
          if (currentAudio) {
            currentAudio.pause();
          }
          currentAudio = new Audio(url);
          currentAudio.addEventListener("ended", () =>
            URL.revokeObjectURL(url),
          );
          await currentAudio.play();
          setStatus(`live · voice: ${provider}`, "live");
          return true;
        } catch (err) {
          console.warn("cloud voice error", err);
          return false;
        }
      }

      // Speak a given string: drive the lip-sync visemes + play the audio
      // (cloud provider when opted in, else the browser voice). The avatar
      // is voice-only — this is called by the voice-to-voice loop to speak
      // the assistant's reply, never to echo typed text.
      async function speakText(text) {
        const visemePost = fetch("/api/avatar/speak", {
          method: "POST",
          headers: { "content-type": "application/json" },
          body: JSON.stringify({ text }),
        })
          .then(async (res) => {
            if (!res.ok) {
              const body = await res.text();
              setStatus(`speak failed: ${res.status} ${body}`, "error");
            }
          })
          .catch((err) => {
            setStatus(`speak failed: ${err.message ?? err}`, "error");
          });

        let spoke = false;
        if (cloudVoiceEl.checked) {
          spoke = await speakViaProvider(text);
        }
        if (!spoke) {
          speakViaBrowser(text);
        }
        await visemePost;
      }

      // ---------------------------------------------------------------
      // Voice-to-voice loop: tap mic → record → tap again → transcribe
      // (agnostic STT) → assistant turn (dedicated voice session) → speak
      // the reply. See docs/plans/2026-06-10-avatar-voice-to-voice-design.md
      // ---------------------------------------------------------------
      const micBtn = document.getElementById("mic");
      const sttInput = document.getElementById("sttService");
      const convoEl = document.getElementById("convo");
      let voiceSessionId = null;
      let mediaRecorder = null;
      let recordedChunks = [];
      let recording = false;

      try {
        sttInput.value = localStorage.getItem("ordo.avatar.sttService") || "";
        sttInput.addEventListener("change", () => {
          localStorage.setItem("ordo.avatar.sttService", sttInput.value.trim());
        });
      } catch (_err) {
        // localStorage unavailable — non-fatal.
      }

      function addConvo(role, text) {
        if (!convoEl) return;
        const line = document.createElement("div");
        line.className = "convo-line " + role;
        const who = document.createElement("span");
        who.className = "who";
        who.textContent = role === "user" ? "you:" : "Ordo:";
        line.appendChild(who);
        line.appendChild(document.createTextNode(text));
        convoEl.appendChild(line);
        convoEl.scrollTop = convoEl.scrollHeight;
      }

      async function ensureVoiceSession() {
        if (voiceSessionId) return voiceSessionId;
        const res = await fetch("/api/assistant/sessions", {
          method: "POST",
          headers: { "content-type": "application/json" },
          body: JSON.stringify({ title: "Avatar voice", mode: "general" }),
        });
        if (!res.ok) throw new Error(`session create failed: ${res.status}`);
        const s = await res.json();
        voiceSessionId =
          s.id || s.session_id || (s.session && s.session.id) || null;
        if (!voiceSessionId) throw new Error("session id missing in response");
        return voiceSessionId;
      }

      function blobToBase64(blob) {
        return new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onloadend = () => {
            const s = String(reader.result || "");
            resolve(s.slice(s.indexOf(",") + 1)); // strip the data: prefix
          };
          reader.onerror = reject;
          reader.readAsDataURL(blob);
        });
      }

      async function runVoiceLoop(blob, format) {
        // 1. transcribe (agnostic STT)
        setStatus("transcribing…");
        let text;
        try {
          const audio_base64 = await blobToBase64(blob);
          const service = sttInput.value.trim();
          const res = await fetch("/api/voice/transcribe", {
            method: "POST",
            headers: { "content-type": "application/json" },
            body: JSON.stringify({
              audio_base64,
              format,
              ...(service ? { service } : {}),
            }),
          });
          if (!res.ok) {
            const body = await res.text();
            console.warn("transcribe failed", res.status, body);
            setStatus(`transcribe failed (${res.status})`, "error");
            return;
          }
          text = (await res.json()).text;
        } catch (err) {
          setStatus(`transcribe error: ${err.message ?? err}`, "error");
          return;
        }
        if (!text || !text.trim()) {
          setStatus("…didn't catch that", "error");
          return;
        }
        addConvo("user", text);

        // 2. assistant turn (dedicated voice session)
        setStatus("thinking…");
        let reply;
        try {
          const sid = await ensureVoiceSession();
          const res = await fetch("/api/assistant/turn", {
            method: "POST",
            headers: { "content-type": "application/json" },
            body: JSON.stringify({ session_id: sid, user_message: text }),
          });
          if (!res.ok) {
            const body = await res.text();
            console.warn("assistant turn failed", res.status, body);
            setStatus(`assistant failed (${res.status})`, "error");
            return;
          }
          const result = await res.json();
          reply = result && result.turn && result.turn.assistant_response;
        } catch (err) {
          setStatus(`assistant error: ${err.message ?? err}`, "error");
          return;
        }
        if (!reply || !reply.trim()) {
          setStatus("…no reply", "error");
          return;
        }
        addConvo("ordo", reply);

        // 3. speak the reply (visemes + audio)
        await speakText(reply);
      }

      async function toggleMic() {
        if (recording) {
          recording = false;
          micBtn.classList.remove("recording");
          micBtn.textContent = "🎤 Tap to talk";
          if (mediaRecorder && mediaRecorder.state !== "inactive") {
            mediaRecorder.stop();
          }
          return;
        }

        let stream;
        try {
          stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        } catch (err) {
          console.warn("getUserMedia failed", err);
          setStatus("mic blocked — allow microphone access for this window", "error");
          return;
        }

        recordedChunks = [];
        const mime = MediaRecorder.isTypeSupported("audio/webm")
          ? "audio/webm"
          : MediaRecorder.isTypeSupported("audio/ogg")
            ? "audio/ogg"
            : "";
        try {
          mediaRecorder = mime
            ? new MediaRecorder(stream, { mimeType: mime })
            : new MediaRecorder(stream);
        } catch (err) {
          console.warn("MediaRecorder failed", err);
          setStatus("recording unsupported in this window", "error");
          stream.getTracks().forEach((t) => t.stop());
          return;
        }
        const format = (mediaRecorder.mimeType || mime || "audio/webm").includes("ogg")
          ? "ogg"
          : "webm";

        mediaRecorder.ondataavailable = (e) => {
          if (e.data && e.data.size) recordedChunks.push(e.data);
        };
        mediaRecorder.onstop = async () => {
          stream.getTracks().forEach((t) => t.stop());
          micBtn.disabled = true;
          try {
            const blob = new Blob(recordedChunks, {
              type: mediaRecorder.mimeType || "audio/webm",
            });
            if (blob.size > 0) await runVoiceLoop(blob, format);
          } finally {
            micBtn.disabled = false;
          }
        };

        mediaRecorder.start();
        recording = true;
        micBtn.classList.add("recording");
        micBtn.textContent = "■ Listening… (tap to stop)";
        setStatus("listening… (tap to stop)", "live");
      }

      micBtn.addEventListener("click", () => void toggleMic());

      boot();
    </script>
  </body>
</html>
