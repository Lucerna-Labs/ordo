name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-Dwarnings"
  ORDO_CLOUD_VAULT: memory

jobs:
  rust:
    name: rust (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Ordo targets Windows + Linux only — macOS is not a supported platform,
        # so we don't gate CI on it. (The sealer's macOS SEP/Keychain tiers stay
        # in-tree as cfg-gated scaffolds; they're simply not built or tested here.)
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        # Pinned (not @stable) so a new rustc/clippy release can't silently turn
        # CI red on unchanged code via newly-added lints. Bump deliberately.
        uses: dtolnay/rust-toolchain@1.93.0
        with:
          components: rustfmt, clippy

      - name: Install Linux system deps
        # ordo-secrets-vault's Tier-1 sealer pulls tss-esapi, gated to
        # cfg(target_os = "linux"). Its -sys crate links libtss2 via pkg-config,
        # so the Linux runner needs the dev headers. Windows uses TBS and macOS
        # the Secure Enclave, so this is the Linux-only native dependency.
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libtss2-dev

      - name: Cache cargo registry + target
        uses: Swatinem/rust-cache@v2

      - name: cargo fmt
        run: cargo fmt --all -- --check

      - name: cargo build
        run: cargo build --workspace --all-targets

      - name: cargo test
        run: cargo test --workspace

      - name: cargo clippy (new crates)
        # The shared ordo-protocol has a handful of preexisting new_without_default
        # warnings we haven't wanted to churn through yet. Keep the strict
        # check focused on the crates we actively rework.
        run: cargo clippy -p ordo-cloud -p ordo-mcp-host -p ordo-control -p ordo-runtime -p ordo-cli --all-targets

  studio:
    name: studio (typecheck)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install npm dependencies
        working-directory: ordo-studio
        run: npm ci || npm install

      - name: Type-check
        working-directory: ordo-studio
        run: npx tsc --noEmit
