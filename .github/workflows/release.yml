name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.1.0). Leave blank for a draft build."
        required: false

permissions:
  contents: write

jobs:
  cli:
    name: ordo CLI (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            bin: ordo
            archive: tar.gz
          - name: windows-x86_64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            bin: ordo.exe
            archive: zip
          - name: macos-x86_64
            os: macos-latest
            target: x86_64-apple-darwin
            bin: ordo
            archive: tar.gz
          - name: macos-aarch64
            os: macos-latest
            target: aarch64-apple-darwin
            bin: ordo
            archive: tar.gz
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - name: Build CLI
        run: cargo build --release -p ordo-cli --target ${{ matrix.target }}

      - name: Package (tar.gz)
        if: matrix.archive == 'tar.gz'
        run: |
          mkdir -p dist
          tar -C target/${{ matrix.target }}/release -czf dist/ordo-${{ matrix.name }}.tar.gz ${{ matrix.bin }}

      - name: Package (zip)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Compress-Archive -Path target\${{ matrix.target }}\release\${{ matrix.bin }} -DestinationPath dist\ordo-${{ matrix.name }}.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ordo-${{ matrix.name }}
          path: dist/*

  studio:
    name: studio bundle (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "ordo-studio/src-tauri -> target"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Linux system deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libjavascriptcoregtk-4.1-dev \
            libsoup-3.0-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev \
            libssl-dev patchelf

      - name: Install npm dependencies
        working-directory: ordo-studio
        run: npm ci || npm install

      - name: Build Tauri bundle
        working-directory: ordo-studio
        run: npx tauri build

      - name: Upload studio artifact
        uses: actions/upload-artifact@v4
        with:
          name: studio-${{ matrix.os }}
          path: |
            ordo-studio/src-tauri/target/release/bundle/**/*

  publish:
    name: publish release
    needs: [cli, studio]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: List assets
        run: find release-assets -type f | sort

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/**/*
          generate_release_notes: true
