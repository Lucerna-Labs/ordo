name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.1.0). Leave blank for a draft build."
        required: false

permissions:
  contents: write

jobs:
  cli:
    name: ordo CLI (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            bin: ordo
            archive: tar.gz
          - name: windows-x86_64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            bin: ordo.exe
            archive: zip
          - name: macos-x86_64
            os: macos-latest
            target: x86_64-apple-darwin
            bin: ordo
            archive: tar.gz
          - name: macos-aarch64
            os: macos-latest
            target: aarch64-apple-darwin
            bin: ordo
            archive: tar.gz
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - name: Build CLI
        run: cargo build --release -p ordo-cli --target ${{ matrix.target }}

      - name: Package (tar.gz)
        if: matrix.archive == 'tar.gz'
        run: |
          mkdir -p dist
          tar -C target/${{ matrix.target }}/release -czf dist/ordo-${{ matrix.name }}.tar.gz ${{ matrix.bin }}

      - name: Package (zip)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Compress-Archive -Path target\${{ matrix.target }}\release\${{ matrix.bin }} -DestinationPath dist\ordo-${{ matrix.name }}.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ordo-${{ matrix.name }}
          path: dist/*

  linux-desktop:
    name: linux desktop package (servo shell)
    # Pinned to 22.04 (Pop!_OS's stable base): a .deb linked against the older
    # glibc/libstdc++ here installs cleanly on both Pop!_OS 22.04 AND 24.04.
    # Building on ubuntu-latest (24.04) would produce a package that fails to
    # install on 22.04.
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.93.0

      - uses: Swatinem/rust-cache@v2
        with:
          # The Servo shell is a separate workspace (excluded from the root one),
          # so cache both target dirs or the heavy mozjs/servo build never caches.
          workspaces: |
            .
            ordo-servo-shell

      - name: Install Linux build prerequisites
        # Reuse the SAME script users run, so a green release proves the user
        # install path. Rust is already on PATH (action above), so the script
        # only installs the apt system libs + Node here.
        run: bash scripts/install-linux-build-deps.sh

      - name: Build Ordo .deb (Pop!_OS / Ubuntu / Debian)
        run: ./Build-Ordo-Linux-Deb.sh

      - name: Build Ordo AppImage (broad Linux coverage)
        # Non-fatal: the .deb is the headline artifact; a flaky AppImage tool
        # download must not sink the release.
        continue-on-error: true
        run: ./Build-Ordo-Linux-AppImage.sh

      - name: Upload Linux desktop artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ordo-linux-desktop
          path: |
            dist/*.deb
            dist/*.AppImage
            dist/*.tar.gz

  publish:
    name: publish release
    needs: [cli, linux-desktop]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: List assets
        run: find release-assets -type f | sort

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/**/*
          generate_release_notes: true
